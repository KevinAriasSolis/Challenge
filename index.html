<!DOCTYPE html>

<html lang="esp">
<head>
    <meta charset="UTF-8">
    <title>Encriptador de Texto</title>
    <link rel="stylesheet" href="forma.css">
    <link rel="stylesheet" href="reset.css">
    <link rel="shortcut icon" href="./imagenes/Frame 6.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300&family=Montserrat:wght@300&display=swap" rel="stylesheet">      
</head>
<body>
    
    <header>
        <img src="imagenes/Logo.png">
    </header>
    <main>
        <section>
            <textarea type="text" style="text-transform:lowercase" style="text" class="input-text" cols="40" rows="6" placeholder ="Ingrese su texto aquí" oninput="validarTextarea(this)" title="Solo deben ser ingresadas letras minusculas y sin caracteres especiales"></textarea>
            <h6>&#9888 Solo letras minúsculas y sin acento</h6>
                <div>
                    <button  type="button" class="encriptar" onclick="btnencriptar(), allLetter()">Encriptar</button>
                    <button type="button" class="desencriptar" onclick="btndesencriptar ()">Desencriptar</button>
                    <button id="copiar" onclick="btncopiar()">Copiar</button>
                </div>
        </section>
        <section>
            <textarea id="munheco" type="text" cols="18" rows="8"class="input-text-area" placeholder="No se encontró texto para encriptar"></textarea>
        </section>
    </main>
    <footer>
       &copy KEVIN ARIAS - ORACLE NEXT EDUCATION 2022
    </footer> 
</body>
    <script src="script.js"></script>
    
</html>
